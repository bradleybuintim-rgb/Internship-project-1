{% extends 'core/base.html' %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<div class="container">
    <div class="row justify-content-center py-5">
        <div class="col-md-6 text-center">
            <div style="background:linear-gradient(135deg,#0a1628,#1a56db);border-radius:24px;padding:3rem;margin-bottom:2rem;">
                <i class="fas fa-file-excel" style="font-size:5rem;color:white;opacity:0.8;"></i>
                <h1 style="color:white;font-size:5rem;font-weight:900;margin:1rem 0 0;">404</h1>
            </div>
            <div class="card p-4">
                <h3 style="color:#0a1628;font-weight:800;">Page Not Found</h3>
                <p style="color:#666;margin:1rem 0;">
                    Oops! The page you are looking for does not exist or has been moved.
                </p>
                <a href="/" class="btn btn-primary btn-lg">
                    <i class="fas fa-home me-2"></i>Back to Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
