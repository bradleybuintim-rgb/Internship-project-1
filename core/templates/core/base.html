<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Format Converter – {% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --navy: #0a1628;
            --navy-mid: #112240;
            --blue: #1a56db;
            --blue-light: #3b82f6;
            --accent: #00b4d8;
            --text-light: #ccd6f6;
            --text-muted: #8892b0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        .navbar {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
            padding: 0.8rem 2rem;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }
        .navbar-brand { font-size: 1.4rem; font-weight: 800; color: white !important; letter-spacing: 1px; }
        .navbar-brand span { color: var(--accent); }
        .nav-link { color: var(--text-light) !important; font-weight: 500; margin: 0 0.3rem; transition: color 0.2s; }
        .nav-link:hover { color: var(--accent) !important; }
        .dropdown-menu { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); padding: 0.5rem; }
        .dropdown-item { border-radius: 8px; padding: 0.5rem 1rem; font-weight: 500; color: #0a1628; }
        .dropdown-item:hover { background: #e8f0fe; color: #1a56db; }
        .main-content { padding: 2rem; min-height: calc(100vh - 70px); }
        .card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .card-header-blue { background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%); color: white; border-radius: 16px 16px 0 0 !important; padding: 1.2rem 1.5rem; font-weight: 700; font-size: 1.1rem; }
        .btn-primary { background: var(--blue); border: none; border-radius: 8px; font-weight: 600; padding: 0.5rem 1.5rem; transition: all 0.2s; }
        .btn-primary:hover { background: var(--blue-light); transform: translateY(-1px); }
        .btn-danger { border-radius: 8px; font-weight: 600; }
        .btn-success { border-radius: 8px; font-weight: 600; }
        .alert { border-radius: 10px; border: none; font-weight: 500; }
        footer { background: var(--navy); color: var(--text-muted); text-align: center; padding: 1rem; font-size: 0.85rem; }
        footer span { color: var(--accent); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <a class="navbar-brand" href="/">Document <span>Format Converter</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item"><a class="nav-link" href="{% url 'home' %}"><i class="fas fa-home me-1"></i>Home</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url 'convert' %}"><i class="fas fa-exchange-alt me-1"></i>Convert</a></li>

            <!-- Tools Dropdown -->
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" id="toolsMenu" role="button" data-bs-toggle="dropdown">
                    <i class="fas fa-tools me-1"></i>Tools
                </a>
                <ul class="dropdown-menu" aria-labelledby="toolsMenu">
                    <li><a class="dropdown-item" href="{% url 'compress' %}"><i class="fas fa-compress-alt me-2" style="color:#1a56db;"></i>Compress</a></li>
                    <li><a class="dropdown-item" href="{% url 'merge' %}"><i class="fas fa-object-group me-2" style="color:#1a56db;"></i>Merge PDFs</a></li>
                    <li><a class="dropdown-item" href="{% url 'split' %}"><i class="fas fa-cut me-2" style="color:#1a56db;"></i>Split PDF</a></li>
                    <li><a class="dropdown-item" href="{% url 'summarize' %}"><i class="fas fa-robot me-2" style="color:#1a56db;"></i>AI Summarize</a></li>
                </ul>
            </li>
        </ul>
    </div>
</nav>
<div class="container mt-3">
    {% for message in messages %}
        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endfor %}
</div>
<div class="main-content">
    {% block content %}{% endblock %}
</div>
<footer>
    <p>© 2026 <span>Document Format Converter</span> — Free Document Tools</p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
