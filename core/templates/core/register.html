{% extends 'core/base.html' %}
{% block title %}Create Account{% endblock %}
{% block content %}
<div class="container">
    <div class="row justify-content-center py-5">
        <div class="col-md-6 col-lg-5">
            <div class="card">
                <div class="card-header-blue text-center">
                    <i class="fas fa-user-plus me-2"></i>Create Your Bideu Account
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label style="font-weight:600;color:#0a1628;">Username</label>
                            <div class="input-group mt-1">
                                <span class="input-group-text" style="background:#e8f0fe;border-right:none;">
                                    <i class="fas fa-user" style="color:#1a56db;"></i>
                                </span>
                                <input type="text" name="username" class="form-control" placeholder="Choose a username" required style="border-left:none;">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label style="font-weight:600;color:#0a1628;">Email Address</label>
                            <div class="input-group mt-1">
                                <span class="input-group-text" style="background:#e8f0fe;border-right:none;">
                                    <i class="fas fa-envelope" style="color:#1a56db;"></i>
                                </span>
                                <input type="email" name="email" class="form-control" placeholder="Enter your email" required style="border-left:none;">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label style="font-weight:600;color:#0a1628;">Password</label>
                            <div class="input-group mt-1">
                                <span class="input-group-text" style="background:#e8f0fe;border-right:none;">
                                    <i class="fas fa-lock" style="color:#1a56db;"></i>
                                </span>
                                <input type="password" name="password1" class="form-control" placeholder="Create a password" required style="border-left:none;">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label style="font-weight:600;color:#0a1628;">Confirm Password</label>
                            <div class="input-group mt-1">
                                <span class="input-group-text" style="background:#e8f0fe;border-right:none;">
                                    <i class="fas fa-lock" style="color:#1a56db;"></i>
                                </span>
                                <input type="password" name="password2" class="form-control" placeholder="Repeat your password" required style="border-left:none;">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">
                            <i class="fas fa-rocket me-2"></i>Create Account
                        </button>
                    </form>
                    <hr>
                    <p class="text-center mb-0" style="color:#666;">
                        Already have an account?
                        <a href="{% url 'login' %}" style="color:#1a56db;font-weight:600;">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
